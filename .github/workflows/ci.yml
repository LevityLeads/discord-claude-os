name: bridge-ci

on:
  push:
    branches: [main]
    paths:
      - "bridge/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "bridge/**"
      - ".github/workflows/ci.yml"

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type check
        run: npm run typecheck

      - name: Tests
        run: npm test
